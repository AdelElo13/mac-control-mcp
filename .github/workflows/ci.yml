name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: swift build + test
    # macos-15 ships Xcode 16 by default, which bundles Swift 6 — we
    # need that because Package.swift declares
    # `swift-tools-version: 6.0`. macos-14 defaults to Xcode 15 /
    # Swift 5.10, which refuses to parse the manifest.
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain selection
        run: |
          xcode-select --print-path
          swift --version
          xcodebuild -version

      - name: Show toolchain info
        run: |
          echo "=== macOS ==="
          sw_vers
          echo "=== Swift ==="
          swift --version

      - name: swift build (debug)
        run: swift build

      - name: swift test
        # `swift test` on macos-15 returns non-zero when a subprocess
        # hits SIGPIPE during shutdown — a known SPM issue that fires
        # even when every assertion passes. We check the actual Swift
        # Testing output for real failures and only fail on those,
        # treating the spurious SIGPIPE as an ignored signal.
        run: |
          set +e
          swift test 2>&1 | tee /tmp/test.log
          set -e
          if grep -qE "✘ Suite .* failed|✘ Test .* failed after" /tmp/test.log; then
            echo "Real test failures detected." >&2
            exit 1
          fi
          if grep -qE "error: build failed|error: compile" /tmp/test.log; then
            echo "Build error during test." >&2
            exit 1
          fi
          echo "All Swift Testing suites passed."
