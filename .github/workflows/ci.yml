name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: swift build + test
    # macos-15 ships Xcode 16 by default, which bundles Swift 6 — we
    # need that because Package.swift declares
    # `swift-tools-version: 6.0`. macos-14 defaults to Xcode 15 /
    # Swift 5.10, which refuses to parse the manifest.
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain selection
        run: |
          xcode-select --print-path
          swift --version
          xcodebuild -version

      - name: Show toolchain info
        run: |
          echo "=== macOS ==="
          sw_vers
          echo "=== Swift ==="
          swift --version

      - name: swift build (debug)
        run: swift build

      - name: swift test
        run: swift test --enable-code-coverage
