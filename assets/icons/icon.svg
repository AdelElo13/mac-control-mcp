<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Brand orange gradient: bright top-left to deep bottom-right -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#FFA350"/>
      <stop offset="55%" stop-color="#F26B2C"/>
      <stop offset="100%" stop-color="#B8330D"/>
    </linearGradient>

    <!-- Subtle top sheen for depth (Apple-style) -->
    <linearGradient id="sheen" x1="50%" y1="0%" x2="50%" y2="55%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#FFFFFF" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Inner ambient shadow at the bottom for grounding -->
    <radialGradient id="bottomShade" cx="50%" cy="100%" r="70%">
      <stop offset="0%"  stop-color="#000000" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Soft drop shadow for the glyph -->
    <filter id="glyphShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Squircle clip path -->
    <clipPath id="squircle">
      <rect x="0" y="0" width="1024" height="1024" rx="184" ry="184"/>
    </clipPath>
  </defs>

  <!-- Squircle background with gradient + sheen + bottom shade -->
  <g clip-path="url(#squircle)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bg)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#bottomShade)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>
  </g>

  <!-- Subtle 1px white inner stroke for crisp edge (Apple style) -->
  <rect x="0.5" y="0.5" width="1023" height="1023" rx="183.5" ry="183.5"
        fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="1"/>

  <!-- Glyph: macOS window with cursor arrow inside (= "controlling a Mac") -->
  <g filter="url(#glyphShadow)">
    <!-- Window body: rounded rect, white outline 24px -->
    <rect x="232" y="280" width="560" height="420" rx="48" ry="48"
          fill="none" stroke="#FFFFFF" stroke-width="32"/>

    <!-- Title-bar dots (3 traffic lights) -->
    <circle cx="296" cy="354" r="18" fill="#FFFFFF"/>
    <circle cx="356" cy="354" r="18" fill="#FFFFFF"/>
    <circle cx="416" cy="354" r="18" fill="#FFFFFF"/>

    <!-- Title-bar separator -->
    <line x1="252" y1="402" x2="772" y2="402"
          stroke="#FFFFFF" stroke-opacity="0.7" stroke-width="6"/>

    <!-- Classic Mac cursor arrow inside the window, slight tilt right -->
    <!-- Arrow geometry: tip at (470,460), pointing toward bottom-right -->
    <g transform="translate(470 460) rotate(8)">
      <path d="M 0,0
               L 0,210
               L 56,160
               L 92,238
               L 130,222
               L 96,148
               L 168,148 Z"
            fill="#FFFFFF"
            stroke="#FFFFFF" stroke-opacity="0.0" stroke-width="0"/>
    </g>
  </g>
</svg>
